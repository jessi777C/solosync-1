services:
  - type: web
    name: solosync-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        value: file:./dev.db
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
